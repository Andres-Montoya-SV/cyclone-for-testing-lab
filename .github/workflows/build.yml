name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    env:
      # CI runners are virtualized; VM guard is expected to trip without this.
      SECURE_CIPHER_ALLOW_VM: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsodium-dev pkg-config

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install libsodium pkg-config

      - name: Build
        run: make

      - name: Smoke test
        run: |
          ./secure_cipher keygen /tmp/scipher-keys
          echo "lab sample" > /tmp/sample.txt
          ./secure_cipher -k /tmp/scipher-keys encrypt /tmp/sample.txt
          ./secure_cipher -k /tmp/scipher-keys decrypt /tmp/sample.txt.enc
          test "$(cat /tmp/sample.txt)" = "lab sample"

      - name: Clean
        run: make clean
